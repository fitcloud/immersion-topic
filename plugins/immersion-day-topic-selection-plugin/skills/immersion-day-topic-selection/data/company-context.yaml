      사용자_지정_제외: "사용자가 특정 과거 주제를 제외하라고 하면 연도와 관계없이 제외 또는 감점한다."
      대체_확인_범위: "올해 목록 확인이 어렵다면 최근 6개월 또는 최근 3-5개 Immersion Day를 우선 확인한다."

