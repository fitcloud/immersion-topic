      - "스타트업/SMB 고객도 PoC, 팀 단위 도입, 비용/운영/보안 개선으로 적용할 수 있는 주제를 우선한다."
      - "엔터프라이즈 성격의 주제라도 lightweight guardrails, PoC-scale data workflow, lean operations, MSP scenario로 재구성할 수 있으면 평가 대상에 포함한다."
      - "public sector 또는 regulated customer에만 맞는 주제는 보안/거버넌스 오퍼링 가능성이 명확할 때만 높은 점수를 준다."

